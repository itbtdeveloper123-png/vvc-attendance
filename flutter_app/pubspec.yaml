name: vvc_hrm
description: "A new Flutter project."
publish_to: "none"

version: 1.1.10+2604304

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  geolocator: ^14.0.2
  mobile_scanner: ^7.2.0
  intl: ^0.20.2
  google_fonts: ^8.0.2
  animate_do: ^4.2.0
  flutter_khmer_chankitec: ^0.0.9
  signature: ^6.3.0
  image_picker: ^1.1.2
  file_picker: ^10.3.2
  flutter_spinkit: ^5.2.1
  dio: ^5.4.3+1
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  pdf: ^3.11.3
  printing: ^5.14.2
  image: ^4.5.4
  flutter_local_notifications: ^17.2.4
  package_info_plus: ^9.0.0
  flutter_inappwebview: ^6.1.5
  pasteboard: ^0.5.0
  record: ^6.2.0
  audioplayers: ^6.6.0
  path_provider: ^2.1.5
  path: ^1.9.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  google_nav_bar: ^5.0.7
  google_maps_flutter: ^2.10.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  sqflite: ^2.4.2
  connectivity_plus: ^7.1.0
  socket_io_client: ^3.1.4
  cloud_firestore: ^6.2.0
  flutter_background_service: ^5.1.0
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  local_auth: ^3.0.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/launcher_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: KhmerFont
      fonts:
        - asset: assets/fonts/KantumruyPro-Bold.ttf
          weight: 700

    - family: Tacteing
      fonts:
        - asset: assets/fonts/Tacteing.ttf
