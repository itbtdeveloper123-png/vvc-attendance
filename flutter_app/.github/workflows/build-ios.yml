name: Build iOS App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get Flutter version
        run: flutter --version

      - name: Get dependencies
        run: |
          cd flutter_app
          flutter pub get

      - name: Install iOS dependencies
        run: |
          cd flutter_app/ios
          pod install --repo-update

      - name: Build for iOS Simulator (no code signing required)
        run: |
          cd flutter_app
          flutter build ios --release --simulator

      - name: Extract app bundle for testing
        run: |
          cd flutter_app
          mkdir -p build/simulator-output
          cp -R build/ios/Release-iphonesimulator/Runner.app build/simulator-output/

      - name: Build unsigned for device using xcodebuild
        run: |
          cd flutter_app/ios
          # Use xcodebuild to build without code signing requirements
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            2>&1 || echo "xcodebuild finished with status $?"

      - name: Create IPA from build output
        run: |
          cd flutter_app
          # Try to find and package the app bundle
          if [ -d "build/DerivedData/Build/Products/Release-iphoneos/Runner.app" ]; then
            APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/Runner.app"
          elif [ -d "build/ios/iphoneos/Runner.app" ]; then
            APP_PATH="build/ios/iphoneos/Runner.app"
          else
            echo "App bundle not found!"
            exit 1
          fi
          
          mkdir -p build/ipa/Payload
          cp -R "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r ../../Vvc-Attendance-unsigned.ipa Payload
          cd ../../
          echo "IPA created: $(pwd)/Vvc-Attendance-unsigned.ipa"
          ls -lh Vvc-Attendance-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: ios-unsigned-app
          path: flutter_app/Vvc-Attendance-unsigned.ipa
          retention-days: 30
          if-no-files-found: ignore

      - name: Create Release (on main push)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: flutter_app/Vvc-HRM-unsigned.ipa
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
