name: Build iOS IPA

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get Flutter version
        run: flutter --version

      - name: Get dependencies
        run: |
          cd flutter_app
          flutter pub get

      - name: Install iOS dependencies
        run: |
          cd flutter_app/ios
          pod install --repo-update

      - name: Build iOS IPA (No Codesign)
        env:
          FLUTTER_NO_CODESIGN: 'true'
          CI: 'true'
        run: |
          cd flutter_app
          flutter build ios --release --no-codesign

      - name: Create IPA package
        run: |
          cd flutter_app
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r ../../../Vvc-HRM-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v3
        with:
          name: ios-ipa
          path: flutter_app/Vvc-HRM-unsigned.ipa
          retention-days: 30

      - name: Create Release (on main push)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: flutter_app/Vvc-HRM-unsigned.ipa
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
