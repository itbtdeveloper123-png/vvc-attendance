<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0F172A">
  <meta name="apple-mobile-web-app-title" content="vvc_attendance">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>vvc_attendance</title>
  <link rel="manifest" href="manifest.json">
  <!-- Preload Khmer Fonts for correct rendering -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@100..900&family=KantumruyPro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
    rel="stylesheet">

  <style>
    body {
      background-color: #0F172A;
      margin: 0;
      padding: 0;
      overflow: hidden;
      touch-action: none; /* Prevents browser scroll offset bugs */
    }

    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      flex-direction: column;
      gap: 20px;
      pointer-events: none; /* Crucial: Prevents invisible div from blocking clicks */
      z-index: 9999;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left-color: #3B82F6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      letter-spacing: 1px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
  <script src="config.js"></script>
  <script>
    (function () {
      var key =
        window.VVC_CONFIG &&
        typeof window.VVC_CONFIG.googleMapsApiKey === 'string'
          ? window.VVC_CONFIG.googleMapsApiKey.trim()
          : '';
      if (!key) {
        console.warn('Google Maps API key is not configured.');
        return;
      }
      var script = document.createElement('script');
      script.src =
        'https://maps.googleapis.com/maps/api/js?key=' +
        encodeURIComponent(key) +
        '&loading=async';
      script.async = true;
      script.defer = true;
      document.head.appendChild(script);
    })();
  </script>
</head>

<body>
  <div id="loading-indicator" class="loading">
    <div class="spinner"></div>
    <div class="loading-text">VVC ATTENDANCE</div>
  </div>


  <script>
    var deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    window.presentPwaInstallPrompt = async function () {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        deferredPrompt = null;
        return outcome;
      }
      return 'not_available';
    };

    window.isPwaInstallable = function () {
      return !!deferredPrompt;
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('load', function () {
      // Remove loading indicator once flutter is ready
      // This is usually handled by flutter but we ensure it clears
      setTimeout(function () {
        var indicator = document.getElementById('loading-indicator');
        if (indicator) {
          indicator.style.display = 'none';
        }
      }, 10000); // Safety timeout
    });
  </script>
</body>

</html>
