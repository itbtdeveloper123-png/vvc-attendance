name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Print Flutter & Dart version
        run: flutter --version

      - name: Disable Swift Package Manager feature flag in Flutter
        run: flutter config --no-enable-swift-package-manager

      - name: Create local config files from examples
        working-directory: flutter_app
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          cp ios/Flutter/MapsApiKey.example.xcconfig ios/Flutter/MapsApiKey.xcconfig 2>/dev/null || echo "No MapsApiKey.example.xcconfig found, skipping"
          if [ ! -z "$GOOGLE_MAPS_API_KEY" ]; then
            echo "Injecting Google Maps API Key from Secrets"
            echo "GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_API_KEY" > ios/Flutter/MapsApiKey.xcconfig
          fi
          cp web/config.example.js web/config.js 2>/dev/null || echo "No config.example.js found, skipping"

      - name: Install Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Cache Xcode DerivedData
        uses: actions/cache@v5
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ios-deriveddata-${{ runner.os }}-${{ hashFiles('flutter_app/ios/Podfile.lock') }}
          restore-keys: |
            ios-deriveddata-${{ runner.os }}-

      - name: Install CocoaPods
        working-directory: flutter_app/ios
        env:
          FLUTTER_NO_CODESIGN: 'true'
          CI: 'true'
        run: |
          pod install --repo-update || pod install

      - name: Build iOS with Flutter (prepare for xcodebuild)
        working-directory: flutter_app
        run: |
          flutter build ios --release --no-codesign

      - name: Build Unsigned IPA for Device using xcodebuild
        working-directory: flutter_app
        run: |
          set -euo pipefail
          
          echo "Building unsigned IPA for device..."
          cd ios
          
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            -arch arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            build
          
          echo "Packaging into IPA..."
          cd ..
          
          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App bundle not found at expected location, checking alternatives..."
            find build -name "Runner.app" -type d
            exit 1
          fi
          
          mkdir -p build/ios/Payload
          cp -R "$APP_PATH" build/ios/Payload/Runner.app
          
          cd build/ios
          zip -r Runner-unsigned.ipa Payload
          rm -rf Payload
          cd ../..
          
          echo "=== IPA Successfully Created ==="
          ls -lh build/ios/Runner-unsigned.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vvc-hrm-ios-unsigned
          path: flutter_app/build/ios/Runner-unsigned.ipa
          if-no-files-found: error

