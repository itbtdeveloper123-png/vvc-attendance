name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Print Flutter & Dart version
        run: flutter --version

      - name: Create local config files from examples
        working-directory: flutter_app
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          cp ios/Flutter/MapsApiKey.example.xcconfig ios/Flutter/MapsApiKey.xcconfig 2>/dev/null || echo "No MapsApiKey.example.xcconfig found, skipping"
          if [ ! -z "$GOOGLE_MAPS_API_KEY" ]; then
            echo "Injecting Google Maps API Key from Secrets"
            echo "GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_API_KEY" > ios/Flutter/MapsApiKey.xcconfig
          fi
          cp web/config.example.js web/config.js 2>/dev/null || echo "No config.example.js found, skipping"

      - name: Install Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build Unsigned IPA for Device (no codesign) (for re-signing locally)
        working-directory: flutter_app
        run: |
          set -euo pipefail
          echo "1) Try flutter build ios --no-codesign (may fail on some Xcode versions)"
          flutter build ios --no-codesign || true

          echo "2) Ensure CocoaPods are installed"
          cd ios
          pod install --repo-update || pod install || true

          echo "3) Build .app for device using xcodebuild with signing disabled (fallback)"
          # Put build products into ../build/ios so paths are consistent
          xcodebuild -workspace Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos BUILD_DIR=../build/ios clean build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM="" 2>&1 | tee ../xcodebuild-device.log || echo "xcodebuild finished with non-zero exit code, continuing to search for app"

          echo "4) Find any built .app for device (supports custom PRODUCT_NAME)"
          APP_PATH=$(find ../build/ios -type d -name "*.app" | head -n 1 || true)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found under ../build/ios. Listing ../build/ios"
            ls -la ../build/ios || true
            exit 1
          fi
          echo "Found app: $APP_PATH"

          echo "5) Package into unsigned .ipa"
          mkdir -p ../build/ios/iphoneos/Payload
          # preserve original app folder name (some sideloaders expect Runner.app specifically)
          APP_BASENAME=$(basename "$APP_PATH")
          cp -r "$APP_PATH" ../build/ios/iphoneos/Payload/"$APP_BASENAME"
          cd ../build/ios/iphoneos
          zip -r Runner-unsigned.ipa Payload
          echo "IPA contents:" && unzip -l Runner-unsigned.ipa || true
          rm -rf Payload
          cd ../../../..

          echo "=== Verification ==="
          ls -la "$APP_PATH" || true
          ls -la flutter_app/build/ios/iphoneos || true

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vvc-hrm-ios-unsigned
          path: flutter_app/build/ios/iphoneos/Runner-unsigned.ipa
          if-no-files-found: error
