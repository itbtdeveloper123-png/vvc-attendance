name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Print Flutter & Dart version
        run: flutter --version

      - name: Create local config files from examples
        working-directory: flutter_app
        run: |
          cp ios/Flutter/MapsApiKey.example.xcconfig ios/Flutter/MapsApiKey.xcconfig 2>/dev/null || echo "No MapsApiKey.example.xcconfig found, skipping"
          cp web/config.example.js web/config.js 2>/dev/null || echo "No config.example.js found, skipping"

      - name: Install Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build Unsigned IPA (no codesign)
        working-directory: flutter_app
        run: |
          flutter build ipa --no-codesign
          echo "=== Listing build output ==="
          find build/ios -name "*.ipa" -o -name "*.xcarchive" 2>/dev/null || true
          echo "=== Packaging IPA ==="
          ARCHIVE=$(find build/ios/archive -name "*.xcarchive" | head -n 1)
          echo "Archive: $ARCHIVE"
          APPS="$ARCHIVE/Products/Applications"
          if [ -d "$APPS" ]; then
            mkdir -p build/ios/iphoneos
            cd "$APPS"
            zip -r "$GITHUB_WORKSPACE/flutter_app/build/ios/iphoneos/Runner-unsigned.ipa" *.app
            echo "IPA created successfully"
          else
            echo "Products/Applications not found, looking for ipa file..."
            find $GITHUB_WORKSPACE/flutter_app/build -name "*.ipa" | head -5
          fi

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vvc-hrm-ios-unsigned
          path: |
            flutter_app/build/ios/iphoneos/*.ipa
            flutter_app/build/ios/ipa/*.ipa
          if-no-files-found: warn
