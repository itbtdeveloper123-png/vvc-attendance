name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Print Flutter & Dart version
        run: flutter --version

      - name: Disable Swift Package Manager feature flag in Flutter
        run: flutter config --no-enable-swift-package-manager

      - name: Create local config files from examples
        working-directory: flutter_app
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          cp ios/Flutter/MapsApiKey.example.xcconfig ios/Flutter/MapsApiKey.xcconfig 2>/dev/null || echo "No MapsApiKey.example.xcconfig found, skipping"
          if [ ! -z "$GOOGLE_MAPS_API_KEY" ]; then
            echo "Injecting Google Maps API Key from Secrets"
            echo "GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_API_KEY" > ios/Flutter/MapsApiKey.xcconfig
          fi
          cp web/config.example.js web/config.js 2>/dev/null || echo "No config.example.js found, skipping"

      - name: Install Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Cache Xcode DerivedData
        uses: actions/cache@v5
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ios-deriveddata-${{ runner.os }}-${{ hashFiles('flutter_app/ios/Podfile.lock') }}
          restore-keys: |
            ios-deriveddata-${{ runner.os }}-

      - name: Install CocoaPods
        working-directory: flutter_app/ios
        env:
          FLUTTER_NO_CODESIGN: 'true'
          CI: 'true'
        run: |
          pod install --repo-update || pod install

      - name: Build Unsigned IPA for Device (no codesign)
        working-directory: flutter_app
        env:
          FLUTTER_NO_CODESIGN: 'true'
          CI: 'true'
        run: |
          set -euo pipefail

          echo "1) Build iOS Release App using Flutter CLI (no-codesign)..."
          flutter build ios --release --no-codesign

          echo "2) Package Runner.app into unsigned .ipa"
          mkdir -p build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/Runner.app

          cd build/ios/iphoneos
          zip -r Runner-unsigned.ipa Payload
          rm -rf Payload
          cd ../../..

          echo "=== IPA Verification ==="
          ls -la build/ios/iphoneos/Runner-unsigned.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vvc-hrm-ios-unsigned
          path: flutter_app/build/ios/iphoneos/Runner-unsigned.ipa
          if-no-files-found: error

