name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Print Flutter & Dart version
        run: flutter --version

      - name: Create local config files from examples
        working-directory: flutter_app
        run: |
          cp ios/Flutter/MapsApiKey.example.xcconfig ios/Flutter/MapsApiKey.xcconfig 2>/dev/null || echo "No MapsApiKey.example.xcconfig found, skipping"
          cp web/config.example.js web/config.js 2>/dev/null || echo "No config.example.js found, skipping"

      - name: Install Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build Unsigned IPA (no codesign)
        working-directory: flutter_app
        run: |
          # 1. Build ចេញជា .app bundle (Release mode) ដោយមិនប្រើ Code Sign
          flutter build ios --release --no-codesign
          
          # 2. បង្កើត Folder សម្រាប់ផ្ទុកហ្វាយ IPA ចុងក្រោយ
          mkdir -p build/ios/iphoneos
          
          # 3. ចូលទៅកាន់ Folder build/ios/iphoneos ដើម្បីរៀបចំរចនាសម្ព័ន្ធ Payload
          cd build/ios/iphoneos
          mkdir Payload
          
          # 4. ចម្លង Runner.app ដែលទើបនឹង build រួច ចូលទៅក្នុង Payload
          cp -r ../Release-iphoneos/Runner.app Payload/
          
          # 5. បង្កើតជាហ្វាយ IPA ដោយការ Zip ថត Payload នោះ
          zip -r Runner-unsigned.ipa Payload
          
          # 6. លុបថត Payload បណ្តោះអាសន្នចេញវិញ
          rm -rf Payload
          
          echo "=== Verification ==="
          ls -la

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vvc-hrm-ios-unsigned
          path: flutter_app/build/ios/iphoneos/Runner-unsigned.ipa
          if-no-files-found: error
