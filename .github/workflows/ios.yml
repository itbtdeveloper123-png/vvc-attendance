name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Print Flutter & Dart version
        run: flutter --version

      - name: Disable Swift Package Manager feature flag in Flutter
        run: flutter config --no-enable-swift-package-manager

      - name: Create local config files from examples
        working-directory: flutter_app
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          cp ios/Flutter/MapsApiKey.example.xcconfig ios/Flutter/MapsApiKey.xcconfig 2>/dev/null || echo "No MapsApiKey.example.xcconfig found, skipping"
          if [ ! -z "$GOOGLE_MAPS_API_KEY" ]; then
            echo "Injecting Google Maps API Key from Secrets"
            echo "GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_API_KEY" > ios/Flutter/MapsApiKey.xcconfig
          fi
          cp web/config.example.js web/config.js 2>/dev/null || echo "No config.example.js found, skipping"

      - name: Install Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Cache Xcode DerivedData
        uses: actions/cache@v5
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ios-deriveddata-${{ runner.os }}-${{ hashFiles('flutter_app/ios/Podfile.lock') }}
          restore-keys: |
            ios-deriveddata-${{ runner.os }}-

      - name: Install CocoaPods
        working-directory: flutter_app/ios
        env:
          FLUTTER_NO_CODESIGN: 'true'
          CI: 'true'
        run: |
          pod install --repo-update || pod install

      - name: Build iOS with Flutter (prepare for manual packaging)
        working-directory: flutter_app
        run: |
          flutter build ios --release --no-codesign 2>&1 || true

      - name: Build Unsigned IPA using manual packaging (skip code signing)
        working-directory: flutter_app
        run: |
          set -euo pipefail
          
          echo "Attempting to package IPA without code signing..."
          
          # Check if app bundle exists from flutter build
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            echo "Found app bundle at: build/ios/iphoneos/Runner.app"
            APP_PATH="build/ios/iphoneos/Runner.app"
          elif [ -d "ios/Runner/Runner.app" ]; then
            echo "Found app bundle at: ios/Runner/Runner.app"
            APP_PATH="ios/Runner/Runner.app"
          else
            echo "App bundle not found, attempting raw xcodebuild..."
            # Build without code signing requirement
            cd ios
            xcodebuild -workspace Runner.xcworkspace \
              -scheme Runner \
              -configuration Release \
              -derivedDataPath DerivedData \
              -arch arm64 \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO 2>&1 || true
            cd ..
            
            if [ -d "ios/DerivedData/Build/Products/Release-iphoneos/Runner.app" ]; then
              APP_PATH="ios/DerivedData/Build/Products/Release-iphoneos/Runner.app"
            else
              echo "Failed to locate app bundle"
              exit 1
            fi
          fi
          
          # Package as IPA
          mkdir -p build/ios/Payload
          cp -R "$APP_PATH" build/ios/Payload/Runner.app
          
          cd build/ios
          zip -r -q Runner-unsigned.ipa Payload
          rm -rf Payload
          cd ../../
          
          echo "=== IPA Created Successfully ==="
          ls -lh build/ios/Runner-unsigned.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vvc-hrm-ios-unsigned
          path: flutter_app/build/ios/Runner-unsigned.ipa
          if-no-files-found: error

