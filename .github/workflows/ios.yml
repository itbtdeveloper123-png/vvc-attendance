name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Print Flutter & Dart version
        run: flutter --version

      - name: Create local config files from examples
        working-directory: flutter_app
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          cp ios/Flutter/MapsApiKey.example.xcconfig ios/Flutter/MapsApiKey.xcconfig 2>/dev/null || echo "No MapsApiKey.example.xcconfig found, skipping"
          if [ ! -z "$GOOGLE_MAPS_API_KEY" ]; then
            echo "Injecting Google Maps API Key from Secrets"
            echo "GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_API_KEY" > ios/Flutter/MapsApiKey.xcconfig
          fi
          cp web/config.example.js web/config.js 2>/dev/null || echo "No config.example.js found, skipping"

      - name: Install Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build Unsigned IPA for Simulator (no codesign)
        working-directory: flutter_app
        run: |
          # 1. Build សម្រាប់ iOS simulator (Profile mode ឬ Debug) ដោយមិនប្រើ codesign
          #    Release mode មិនគាំទ្រសម្រាប់ simulator (error ពេលហៅ Release)
          flutter build ios --profile --no-codesign --simulator || flutter build ios --debug --no-codesign --simulator

          # 2. ស្វែងរក Runner.app ដែលបានបង្កើត សម្រាប់ iphonesimulator (robust search)
          APP_PATH=""
          APP_PATH=$(find build/ios -path "*/iphonesimulator/*" -type d -name "Runner.app" | head -n 1 || true)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found. Listing build/ios contents for debugging:"
            ls -la build/ios || true
            exit 1
          fi

          echo "Found Runner.app at: $APP_PATH"

          # 3. បង្កើត Payload និងចម្លង Runner.app ទៅក្នុងវា
          mkdir -p build/ios/iphoneos/Payload
          cp -r "$APP_PATH" build/ios/iphoneos/Payload/

          # 4. បញ្ចុះជា zip (.ipa) សម្រាប់ artifact
          cd build/ios/iphoneos
          zip -r Runner-simulator.ipa Payload

          # 5. លុបថត Payload បណ្ដោះអាសន្ន
          rm -rf Payload
          cd ../../../..

          echo "=== Verification ==="
          ls -la "$APP_PATH" || true
          ls -la build/ios/iphoneos || true

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vvc-hrm-ios-simulator
          path: flutter_app/build/ios/iphoneos/Runner-simulator.ipa
          if-no-files-found: error
