name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Print Flutter & Dart version
        run: flutter --version

      - name: Disable Swift Package Manager feature flag in Flutter
        run: flutter config --no-enable-swift-package-manager

      - name: Create local config files from examples
        working-directory: flutter_app
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          cp ios/Flutter/MapsApiKey.example.xcconfig ios/Flutter/MapsApiKey.xcconfig 2>/dev/null || echo "No MapsApiKey.example.xcconfig found, skipping"
          if [ ! -z "$GOOGLE_MAPS_API_KEY" ]; then
            echo "Injecting Google Maps API Key from Secrets"
            echo "GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_API_KEY" > ios/Flutter/MapsApiKey.xcconfig
          fi
          cp web/config.example.js web/config.js 2>/dev/null || echo "No config.example.js found, skipping"

      - name: Install Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Cache Xcode DerivedData
        uses: actions/cache@v5
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ios-deriveddata-${{ runner.os }}-${{ hashFiles('flutter_app/ios/Podfile.lock') }}
          restore-keys: |
            ios-deriveddata-${{ runner.os }}-

      - name: Install CocoaPods
        working-directory: flutter_app/ios
        env:
          FLUTTER_NO_CODESIGN: 'true'
          CI: 'true'
        run: |
          pod install --repo-update || pod install

      - name: Build Unsigned iOS App & IPA
        working-directory: flutter_app
        env:
          FLUTTER_NO_CODESIGN: 'true'
          CI: 'true'
        run: |
          set -euo pipefail
          
          echo "1) Preparing Flutter iOS build configuration..."
          flutter build ios --config-only
          
          echo "2) Building iOS Release App using xcodebuild (no codesign)..."
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            BUILD_DIR=../build/ios \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="1234567890" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build > ../xcodebuild.log 2>&1

          cd ..
          
          echo "3) Locating built Runner.app..."
          # Look specifically in the Release-iphoneos directory under build/ios
          APP_PATH="build/ios/Release-iphoneos/Runner.app"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found at $APP_PATH! Printing last 100 lines of build log:"
            tail -n 100 xcodebuild.log || true
            exit 1
          fi

          # Verify the actual binary exists inside Runner.app (not just an empty dir)
          if [ ! -f "$APP_PATH/Runner" ]; then
            echo "ERROR: Runner binary not found inside Runner.app! The build may have failed silently."
            echo "Contents of Runner.app:"
            ls -la "$APP_PATH" || true
            echo "Last 100 lines of build log:"
            tail -n 100 xcodebuild.log || true
            exit 1
          fi

          echo "Found Runner.app at: $APP_PATH"
          
          echo "4) Packaging into unsigned IPA..."
          mkdir -p build/ios/iphoneos/Payload
          cp -R "$APP_PATH" build/ios/iphoneos/Payload/Runner.app
          
          cd build/ios/iphoneos
          zip -r -q Runner-unsigned.ipa Payload
          rm -rf Payload
          cd ../../..
          
          echo "=== IPA Created Successfully ==="
          ls -lh build/ios/iphoneos/Runner-unsigned.ipa

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: flutter_app/xcodebuild.log
          if-no-files-found: ignore



      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vvc-hrm-ios-unsigned
          path: flutter_app/build/ios/iphoneos/Runner-unsigned.ipa
          if-no-files-found: error

