name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Print Flutter & Dart version
        run: flutter --version

      - name: Create local config files from examples
        working-directory: flutter_app
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          cp ios/Flutter/MapsApiKey.example.xcconfig ios/Flutter/MapsApiKey.xcconfig 2>/dev/null || echo "No MapsApiKey.example.xcconfig found, skipping"
          if [ ! -z "$GOOGLE_MAPS_API_KEY" ]; then
            echo "Injecting Google Maps API Key from Secrets"
            echo "GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_API_KEY" > ios/Flutter/MapsApiKey.xcconfig
          fi
          cp web/config.example.js web/config.js 2>/dev/null || echo "No config.example.js found, skipping"

      - name: Install Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build Unsigned IPA for Simulator (no codesign)
        working-directory: flutter_app
        run: |
          # 1. Build Release សម្រាប់ iOS simulator ដោយមិនប្រើ codesign
          flutter build ios --release --no-codesign --simulator

          # 2. រក Runner.app ដែលបានបង្កើត (គ្រាន់តែគាំទ្រប៉ះពាល់ផ្លូវទាំងពីរ)
          if [ -d "build/ios/iphonesimulator/Release-iphonesimulator/Runner.app" ]; then
            APP_PATH="build/ios/iphonesimulator/Release-iphonesimulator/Runner.app"
          elif [ -d "build/ios/iphonesimulator/Runner.app" ]; then
            APP_PATH="build/ios/iphonesimulator/Runner.app"
          else
            echo "ERROR: Runner.app not found. Build output paths:"
            ls -la build/ios/iphonesimulator || true
            exit 1
          fi

          # 3. បង្កើត Payload និងចម្លង Runner.app ទៅក្នុងវា
          mkdir -p build/ios/iphoneos/Payload
          cp -r "$APP_PATH" build/ios/iphoneos/Payload/

          # 4. បញ្ចុះជា zip (.ipa) សម្រាប់ artifact
          cd build/ios/iphoneos
          zip -r Runner-simulator.ipa Payload

          # 5. លុបថត Payload បណ្ដោះអាសន្ន
          rm -rf Payload
          cd ../../../..

          echo "=== Verification ==="
          ls -la "$APP_PATH" || true
          ls -la build/ios/iphoneos || true

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vvc-hrm-ios-simulator
          path: flutter_app/build/ios/iphoneos/Runner-simulator.ipa
          if-no-files-found: error
