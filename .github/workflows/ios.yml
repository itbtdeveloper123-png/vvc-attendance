name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./flutter_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create local config files from examples
        run: |
          cp ios/Flutter/MapsApiKey.example.xcconfig ios/Flutter/MapsApiKey.xcconfig || true
          cp web/config.example.js web/config.js || true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Print Flutter & Dart version
        run: flutter --version

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          cd ios && pod install --repo-update
        timeout-minutes: 15

      # If certificates are not installed, build an unsigned IPA
      - name: Build Unsigned IPA
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.P12_BASE64 }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        if: ${{ env.BUILD_CERTIFICATE_BASE64 == '' || env.BUILD_PROVISION_PROFILE_BASE64 == '' }}
        run: |
          set -e
          flutter build ipa --no-codesign --verbose
          echo "=== Build Finished, Creating IPA ==="
          ARCHIVE_PATH=$(find build/ios/archive -name "*.xcarchive" | head -n 1)
          echo "Archive path: $ARCHIVE_PATH"
          APPS_DIR="$ARCHIVE_PATH/Products/Applications"
          ls "$APPS_DIR"
          mkdir -p build/ios/iphoneos
          cd "$APPS_DIR"
          zip -r "$GITHUB_WORKSPACE/flutter_app/build/ios/iphoneos/Runner-unsigned.ipa" *.app
          echo "=== IPA Created Successfully ==="

      # Step to install certificates and profiles if secrets are provided
      - name: Install Apple Certificate and Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' && env.BUILD_PROVISION_PROFILE_BASE64 != '' }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build Signed IPA
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.P12_BASE64 }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' && env.BUILD_PROVISION_PROFILE_BASE64 != '' }}
        run: |
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist --verbose

      # Upload the artifact
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-artifact
          path: |
            flutter_app/build/ios/iphoneos/*.ipa
            flutter_app/build/ios/ipa/*.ipa
          if-no-files-found: warn
