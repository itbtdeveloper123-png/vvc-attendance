name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Print Flutter & Dart version
        run: flutter --version

      - name: Disable Swift Package Manager feature flag in Flutter
        run: flutter config --no-enable-swift-package-manager

      - name: Create local config files from examples
        working-directory: flutter_app
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          cp ios/Flutter/MapsApiKey.example.xcconfig ios/Flutter/MapsApiKey.xcconfig 2>/dev/null || echo "No MapsApiKey.example.xcconfig found, skipping"
          if [ ! -z "$GOOGLE_MAPS_API_KEY" ]; then
            echo "Injecting Google Maps API Key from Secrets"
            echo "GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_API_KEY" > ios/Flutter/MapsApiKey.xcconfig
          fi
          cp web/config.example.js web/config.js 2>/dev/null || echo "No config.example.js found, skipping"

      - name: Install Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: flutter_app/ios
        env:
          FLUTTER_NO_CODESIGN: 'true'
          CI: 'true'
        run: |
          pod install --repo-update || pod install

      - name: Build Unsigned IPA for Device (no codesign)
        working-directory: flutter_app
        env:
          FLUTTER_NO_CODESIGN: 'true'
          CI: 'true'
        run: |
          set -euo pipefail

          echo "1) Generate Flutter assets & frameworks (no-codesign workaround)..."
          # Use flutter assemble to generate Dart kernel & assets without triggering signing check
          flutter build ios-framework \
            --no-debug \
            --no-profile \
            --release \
            --output=../ios_frameworks \
            2>&1 || echo "flutter build ios-framework done (warnings ok)"

          echo "2) Build .app for device using xcodebuild with signing fully disabled"
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            BUILD_DIR=../build/ios \
            ONLY_ACTIVE_ARCH=NO \
            EXCLUDED_ARCHS="arm64" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            clean build \
            2>&1 | tee ../xcodebuild-device.log || echo "xcodebuild done (check log for errors)"

          echo "3) Find built .app"
          APP_PATH=$(find ../build/ios -type d -name "*.app" | head -n 1 || true)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found. Last 50 lines of xcodebuild log:"
            tail -50 ../xcodebuild-device.log || true
            echo "Listing ../build/ios:"
            ls -la ../build/ios || true
            exit 1
          fi
          echo "Found app: $APP_PATH"

          echo "4) Package into unsigned .ipa"
          mkdir -p ../build/ios/iphoneos/Payload
          if command -v ditto >/dev/null 2>&1; then
            ditto "$APP_PATH" ../build/ios/iphoneos/Payload/Runner.app
          else
            cp -R "$APP_PATH" ../build/ios/iphoneos/Payload/Runner.app
          fi

          if [ ! -f ../build/ios/iphoneos/Payload/Runner.app/Info.plist ]; then
            echo "ERROR: Info.plist not found inside Runner.app"
            ls -la ../build/ios/iphoneos/Payload || true
            exit 1
          fi

          cd ../build/ios/iphoneos
          zip -r Runner-unsigned.ipa Payload
          echo "IPA created successfully!"
          unzip -l Runner-unsigned.ipa | head -20 || true
          rm -rf Payload
          cd ../../../..

          echo "=== Final Verification ==="
          ls -la flutter_app/build/ios/iphoneos/ || true

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vvc-hrm-ios-unsigned
          path: flutter_app/build/ios/iphoneos/Runner-unsigned.ipa
          if-no-files-found: error

